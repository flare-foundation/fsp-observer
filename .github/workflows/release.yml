name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: See `CHANGELOG.md` for details
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true  # add PR/commit summary; CHANGELOG still primary